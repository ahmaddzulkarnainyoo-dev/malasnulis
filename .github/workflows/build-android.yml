name: Build Malas Nulis APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Biar lo bisa build manual dari website GitHub juga

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦩 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'  # Pakai versi terbaru stable
          channel: 'stable'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 📱 Build APK (Release)
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload APK sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MalasNulis-APK
          path: build/app/outputs/flutter-apk/*.apk