name: malas_nulis
description: "Aplikasi menempelkan tulisan tangan ke foto kertas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Kamera & Galeri
  image_picker: ^1.0.4
  camera: ^0.10.5

  # Manipulasi Gambar (Pure Dart, paling ringan)
  image: ^4.1.3

  # Local Storage & Izin
  path_provider: ^2.1.0
  permission_handler: ^11.0.1
  image_gallery_saver: 2.0.3
  shared_preferences: ^2.2.2

  # Iklan (Pakai ID Test)
  google_mobile_ads: ^5.1.0

  # UI
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true